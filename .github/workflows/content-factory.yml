name: Content Factory — Scheduled Generation

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to generate'
        default: '1'
      mock:
        description: 'Use mock generator (no Claude API)'
        type: boolean
        default: true

permissions:
  contents: write

# Prevent parallel runs racing on the same branch push
concurrency:
  group: content-factory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd content-factory && npm install

      - name: Initialize content factory
        run: cd content-factory && npm run init
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          SITE_BASE_URL: https://rentierspro.com
          CONTENT_DIR: ../content/blog
          SITE_PUBLIC_DIR: ../public

      - name: Show queue before generation
        run: |
          cd content-factory
          npm run queue:list
          npx tsx src/index.ts queue stats

      - name: Run integration test
        continue-on-error: true
        run: cd content-factory && npm run test
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FROM_EMAIL: onboarding@resend.dev
          SITE_BASE_URL: https://rentierspro.com
          CONTENT_DIR: ../content/blog
          SITE_PUBLIC_DIR: ../public

      - name: Generate articles batch (mock if no Anthropic key)
        run: |
          cd content-factory
          MOCK_FLAG="--mock"
          if [ "${{ github.event.inputs.mock }}" != "true" ] && [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            MOCK_FLAG=""
            echo "Using Claude API"
          else
            echo "Using mock generator (no Claude API)"
          fi
          npm run batch -- -n ${{ github.event.inputs.count || '1' }} $MOCK_FLAG
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FROM_EMAIL: onboarding@resend.dev
          SITE_BASE_URL: https://rentierspro.com
          CONTENT_DIR: ../content/blog
          SITE_PUBLIC_DIR: ../public

      - name: Show generated files
        run: |
          echo "=== New/updated blog files ==="
          git status --short content/blog/ public/sitemap.xml content-factory/queue/ || true
          ls -la content/blog/*.mdx | tail -5 || true

      - name: Commit and push generated articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/ public/sitemap.xml content-factory/queue/
          if git diff --staged --quiet; then
            echo "::error::No article files to commit — generation likely failed. Check batch logs above."
            exit 1
          fi
          git commit -m "feat(blog): content factory generated articles"
          git fetch origin ${{ github.ref_name }}
          if ! git pull --rebase origin ${{ github.ref_name }}; then
            echo "::error::Rebase failed — main changed during generation. Aborting."
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:${{ github.ref_name }}
